# Egress proxy policy: allow only the domains in allowed-domains.acl, deny the rest.
# Filtering is by destination domain (the CONNECT target host for HTTPS), so
# wildcards work and CDN IP rotation does not break the allowlist.

http_port 3128

# Destination domains permitted to leave the network.
acl allowed_domains dstdomain "/etc/squid/allowed-domains.acl"

# Limit destinations to standard web ports (plain HTTP 80, HTTPS 443); CONNECT
# (TLS tunnel) is further restricted to 443.
acl Safe_ports port 80
acl Safe_ports port 443
acl SSL_ports port 443
acl CONNECT method CONNECT
http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports

# Allow plain HTTP and HTTPS only to allowed domains; deny everything else.
http_access allow allowed_domains
http_access deny all

# No caching: this is a policy gateway, not an accelerator.
cache deny all

# Log to the image's default files. The image entrypoint runs `tail -F` on these
# and forwards them to the container's stdout (visible via `docker compose logs gateway`).
# Squid drops worker privileges to the `proxy` user, which cannot write to the
# root-owned /dev/stdout — pointing the logs there directly makes squid abort on startup.
logfile_rotate 0
access_log stdio:/var/log/squid/access.log
cache_log /var/log/squid/cache.log

# Do not advertise the proxy / leak the client address.
forwarded_for delete
via off
httpd_suppress_version_string on
